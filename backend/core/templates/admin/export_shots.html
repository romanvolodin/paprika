{% extends "admin/base_site.html" %}

{% block content %}

{% if error %}
  <div style="background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    {{ error }}
  </div>
{% endif %}

<form action="" method="post">
  {% csrf_token %}

  {% for shot in shots %}
    <input type="hidden" name="_selected_action" value="{{ shot.pk }}" />
  {% endfor %}
  <input type="hidden" name="action" value="download_shots_as_xlsx" />

  <p>Выбрано шотов: <strong>{{ shots|length }}</strong></p>

  <p>
    <label for="{{ form.assigned_to.id_for_label }}">{{ form.assigned_to.label }}:</label>
    {{ form.assigned_to }}
  </p>

  <p>
    <label for="{{ form.resize_preview.id_for_label }}">{{ form.resize_preview }} {{ form.resize_preview.label }}</label>
  </p>

  <p>
    <label>Максимальная</label>
    {{ form.preview_dimension }}
    {{ form.preview_size }}
    <label for="{{ form.preview_size.id_for_label }}">пикс.</label>
  </p>

  <input type="submit" name="apply" value="Скачать Excel" />
</form>

{% endblock %}
